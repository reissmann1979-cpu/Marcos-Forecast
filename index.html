<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#070c14;min-height:100vh;font-family:'DM Sans',sans-serif;color:#e2e8f0;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-thumb{background:rgba(34,211,238,0.2);border-radius:2px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:.25;}50%{opacity:.8;}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

.app{min-height:100vh;background:radial-gradient(ellipse at 15% 0%,rgba(14,165,233,0.06),transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(99,102,241,0.05),transparent 55%);}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(7,12,20,0.97);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.05);padding:11px 15px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#0ea5e9,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 14px rgba(34,211,238,0.35);}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.07em;color:#f8fafc;line-height:1;}
.logo-text span{color:#22d3ee;}
.logo-sub{font-size:7px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.14em;}
.nav-r{display:flex;align-items:center;gap:9px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22d3ee;box-shadow:0 0 6px #22d3ee;animation:pulse 2s infinite;}
.live-txt{font-size:8px;color:#1e3a4a;font-family:'DM Mono',monospace;}
.refresh-btn{padding:5px 11px;border-radius:7px;background:rgba(34,211,238,0.07);border:1px solid rgba(34,211,238,0.18);color:#22d3ee;cursor:pointer;font-size:13px;transition:background .2s;}
.refresh-btn:active{background:rgba(34,211,238,0.2);}

/* SCREENS */
.screen{display:none;}
.screen.active{display:block;animation:fadeUp .3s ease;}

/* HOME */
.home-wrap{padding:14px 14px 32px;}
.search-box{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.05);border-radius:12px;border:1px solid rgba(255,255,255,0.08);padding:10px 13px;margin-bottom:16px;}
.search-input{flex:1;background:none;border:none;outline:none;color:#e2e8f0;font-size:14px;}
.search-input::placeholder{color:#1e3a4a;}
.sec-lbl{font-size:8px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.18em;margin-bottom:10px;padding-left:2px;}
.resort-list{display:flex;flex-direction:column;gap:10px;}

/* RESORT CARD HOME */
.rc{border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:border-color .2s,background .2s;overflow:hidden;}
.rc:active{background:rgba(34,211,238,0.06);border-color:rgba(34,211,238,0.25);}
.rc-top{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 10px;}
.rc-left{display:flex;align-items:center;gap:11px;}
.rc-emoji{font-size:23px;}
.rc-name{font-size:15px;font-weight:700;color:#f1f5f9;}
.rc-region{font-size:10px;color:#334155;margin-top:1px;}
.rc-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.rc-wx{text-align:right;}
.rc-wx-icon{font-size:22px;display:block;line-height:1.1;}
.rc-wx-temp{font-size:12px;font-weight:700;color:#fbbf24;font-family:'DM Mono',monospace;white-space:nowrap;}
.rc-wx-cond{font-size:8px;color:#334155;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px;}
.rc-arrow{font-size:19px;color:#1e3a4a;margin-left:3px;}

/* STATUS BAR IN CARD */
.rc-st{border-top:1px solid rgba(255,255,255,0.05);padding:8px 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;min-height:36px;}
.chip{display:flex;align-items:center;gap:3px;}
.chip-lbl{font-size:8px;color:#475569;font-family:'DM Mono',monospace;}
.chip-val{font-size:11px;font-weight:700;font-family:'DM Mono',monospace;}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.shimmer{height:10px;border-radius:5px;width:200px;background:linear-gradient(90deg,rgba(255,255,255,0.03) 25%,rgba(255,255,255,0.07) 50%,rgba(255,255,255,0.03) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}

/* DETAIL */
.det-wrap{padding:14px 14px 32px;}
.back-btn{display:flex;align-items:center;gap:4px;cursor:pointer;margin-bottom:14px;width:fit-content;}
.back-arr{color:#22d3ee;font-size:26px;font-weight:200;line-height:1;}
.back-txt{color:#22d3ee;font-size:13px;}
.d-title-row{display:flex;align-items:center;gap:9px;margin-bottom:3px;}
.d-emoji{font-size:24px;}
.d-name{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:.04em;color:#f8fafc;}
.d-meta{font-size:9px;color:#1e3a4a;font-family:'DM Mono',monospace;margin-bottom:13px;letter-spacing:.05em;}

/* STATUS BLOCK DETAIL */
.st-block{border-radius:14px;border:1px solid rgba(34,211,238,0.15);padding:14px;margin-bottom:12px;background:linear-gradient(135deg,rgba(34,211,238,0.04),rgba(14,165,233,0.02));}
.st-block-title{font-size:8px;color:#22d3ee;font-family:'DM Mono',monospace;letter-spacing:.12em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.st-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.st-cell{background:rgba(255,255,255,0.03);border-radius:9px;padding:8px 9px;border:1px solid rgba(255,255,255,0.05);}
.st-cell-lbl{font-size:7px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.06em;margin-bottom:3px;}
.st-cell-val{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;line-height:1.1;}
.st-cell-sub{font-size:8px;color:#334155;margin-top:2px;}
.st-footer{font-size:7px;color:#1e3a4a;font-family:'DM Mono',monospace;margin-top:9px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05);}
.st-link{color:#22d3ee;text-decoration:none;}

/* WX BLOCK */
.wx-block{border-radius:14px;border:1px solid rgba(255,255,255,0.07);padding:14px;margin-bottom:12px;background:rgba(255,255,255,0.02);}
.wx-title{font-size:8px;color:#475569;font-family:'DM Mono',monospace;letter-spacing:.12em;margin-bottom:11px;}
.wx-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.wx-icon{font-size:50px;line-height:1;}
.wx-tmax{font-family:'Bebas Neue',sans-serif;font-size:44px;color:#f8fafc;line-height:1;}
.wx-tmin{color:#475569;font-size:12px;}
.wx-cima{color:#7dd3fc;font-size:11px;margin-top:2px;}
.wx-cond{color:#94a3b8;font-size:12px;font-weight:600;margin-top:4px;}
.wx-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.wx-bar-bg{flex:1;height:5px;background:rgba(255,255,255,0.07);border-radius:3px;overflow:hidden;}
.wx-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.wx-bar-val{font-size:13px;font-weight:900;font-family:'DM Mono',monospace;min-width:30px;}
.wx-bar-lbl{font-size:7px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.08em;margin-bottom:10px;}
.wx-rel{display:flex;align-items:center;gap:6px;}
.wx-rel-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.wx-rel-txt{font-size:9px;font-family:'DM Mono',monospace;font-weight:700;}

/* 7 DAYS */
.days-title{font-size:8px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.12em;margin-bottom:8px;}
.days-scroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;margin-bottom:12px;}
.days-scroll::-webkit-scrollbar{height:2px;}
.dc{flex-shrink:0;width:74px;padding:9px 6px;border-radius:11px;text-align:center;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all .15s;}
.dc.sel{background:rgba(34,211,238,0.07);border-color:rgba(34,211,238,0.3);}
.dc-lbl{font-size:8px;font-family:'DM Mono',monospace;color:#334155;font-weight:700;display:block;margin-bottom:4px;}
.dc-lbl.hoy{color:#22d3ee;}
.dc-ico{font-size:20px;display:block;margin-bottom:3px;}
.dc-hi{font-size:13px;font-weight:700;color:#f1f5f9;display:block;}
.dc-lo{font-size:10px;color:#334155;display:block;margin-bottom:2px;}
.dc-sn{font-size:8px;color:#7dd3fc;font-family:'DM Mono',monospace;display:block;}
.dc-pb{font-size:8px;color:#93c5fd;font-family:'DM Mono',monospace;display:block;}
.dc-bar{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;margin:5px 0 2px;overflow:hidden;}
.dc-bar-f{height:100%;border-radius:2px;}
.dc-sc{font-size:7px;font-family:'DM Mono',monospace;}

/* DAY METRICS */
.day-detail-title{font-size:8px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.12em;margin-bottom:8px;}
.models-row{display:flex;gap:7px;margin-bottom:11px;}
.model-box{flex:1;text-align:center;padding:9px 5px;border-radius:9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);}
.model-name{color:#22d3ee;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;display:block;margin-bottom:4px;}
.model-hi{color:#fbbf24;font-size:14px;font-weight:700;font-family:'DM Mono',monospace;display:block;}
.model-lo{color:#7dd3fc;font-size:11px;font-family:'DM Mono',monospace;display:block;}
.model-mm{color:#a78bfa;font-size:9px;font-family:'DM Mono',monospace;display:block;margin-top:2px;}
.metrics{display:flex;flex-direction:column;gap:7px;}
.met{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);}
.met-ico{font-size:20px;width:26px;text-align:center;flex-shrink:0;}
.met-info{flex:1;}
.met-lbl{font-size:7px;color:#1e3a4a;font-family:'DM Mono',monospace;letter-spacing:.08em;}
.met-val{font-size:15px;font-weight:700;font-family:'DM Mono',monospace;}
.met-sub{font-size:8px;color:#334155;margin-top:1px;}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;}
.sp{position:relative;width:50px;height:50px;}
.sp1{position:absolute;inset:0;border:2px solid rgba(34,211,238,0.1);border-radius:50%;}
.sp2{position:absolute;inset:0;border:2px solid transparent;border-top-color:#22d3ee;border-radius:50%;animation:spin .9s linear infinite;}
.sp3{position:absolute;inset:12px;border:2px solid transparent;border-top-color:#0ea5e9;border-radius:50%;animation:spin .6s linear infinite reverse;}
.ldr-t{color:#22d3ee;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.12em;}
.ldr-s{color:#334155;font-size:9px;font-family:'DM Mono',monospace;}

footer{padding:12px 16px;text-align:center;border-top:1px solid rgba(255,255,255,0.04);}
footer p{font-size:7px;color:#0f172a;font-family:'DM Mono',monospace;letter-spacing:.05em;}

/* ── WEBCAMS ── */
.wc-block{background:#0d1f2d;border:1px solid #1e3a4a;border-radius:14px;padding:14px;margin-top:14px;}
.wc-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.12em;color:#22d3ee;margin-bottom:12px;}
.wc-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.wc-tab{font-family:'DM Mono',monospace;font-size:9px;padding:4px 10px;border-radius:20px;border:1px solid #1e3a4a;color:#94a3b8;cursor:pointer;letter-spacing:.06em;transition:all .2s;}
.wc-tab.active{background:#22d3ee;color:#070c14;border-color:#22d3ee;}
.wc-img-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#0a1929;}
.wc-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:10px;}
.wc-img-err{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#475569;font-family:'DM Mono',monospace;display:none;}
.wc-ts{font-size:8px;color:#475569;font-family:'DM Mono',monospace;margin-top:6px;text-align:right;}
</style>

// Proxies CORS en orden de fiabilidad.
// Si uno falla o devuelve poco contenido, prueba el siguiente.
// Timeout corto (6s) para no bloquear la UI demasiado tiempo.
const PROXIES = [
  u => ({ url: `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`, json: true }),
  u => ({ url: `https://corsproxy.io/?${encodeURIComponent(u)}`, json: false }),
  u => ({ url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, json: false }),
  u => ({ url: `https://thingproxy.freeboard.io/fetch/${u}`, json: false }),
  u => ({ url: `https://htmlpreview.github.io/?${u}`, json: false }),
];

async function proxyFetch(url) {
  for (const mkProxy of PROXIES) {
    const { url: proxyUrl, json } = mkProxy(url);
    try {
      const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(6000) });
      if (!r.ok) continue;
      let html = '';
      if (json) {
        const j = await r.json();
        html = j.contents || j.body || '';
      } else {
        html = await r.text();
        // Si nos devuelve JSON igualmente, intentar extraer contents
        if (html.trimStart().startsWith('{')) {
          try { const j = JSON.parse(html); html = j.contents || j.body || html; } catch {}
        }
      }
      if (html.length > 500) return html;
    } catch { /* siguiente proxy */ }
  }
  return null;
}

// Igual que proxyFetch pero con reintentos: si el primer intento falla,
// espera 1s y lo intenta de nuevo (útil cuando el proxy está ocupado)
async function proxyFetchWithRetry(url, retries = 2) {
  for (let i = 0; i < retries; i++) {
    const html = await proxyFetch(url);
    if (html) return html;
    if (i < retries - 1) await new Promise(r => setTimeout(r, 1000 + i * 500));
  }
  return null;
}

// Extrae número de texto, ej: "15.4 km" → 15.4
function num(s) {
  if (!s) return null;
  const m = String(s).match(/([\d]+[.,]?[\d]*)/);
  return m ? parseFloat(m[1].replace(',', '.')) : null;
}

// Parser para San Isidro y Leitariegos (DiputaciónLeón)
// Formato real verificado: stripTags convierte tabla HTML en "| Estado | Abierta |"
// y listado rápido queda como "Km esquiables15.4km/34km", "Pistas16/35"
function parseDipuLeon(html) {
  const t = stripTags(html).replace(/\s+/g,' ');

  // Estado desde imagen src o celda tabla
  const estado = /abierta\.jpg/i.test(html) ? 'Abierta'
    : /cerrada\.jpg/i.test(html) ? 'Cerrada'
    : /Estado\s+\|\s+(Abierta)/i.test(t) ? 'Abierta'
    : /Estado\s+\|\s+(Cerrada)/i.test(t) ? 'Cerrada'
    : 'Desconocido';

  // Km: listado compacto "Km esquiables15.4km/34km" O tabla "Km esquiables | 15.4 km"
  let kmAbiertos = null, kmTotal = null;
  const kmC = t.match(/Km\s+esquiables\s+([\d.]+)km\/([\d.]+)km/i);   // listado
  const kmT = t.match(/Km\s+esquiables\s+\|\s+([\d.]+)\s+km/i);        // tabla
  if (kmC) { kmAbiertos = parseFloat(kmC[1]); kmTotal = parseFloat(kmC[2]); }
  else if (kmT) { kmAbiertos = parseFloat(kmT[1]); }

  // Pistas: listado "Pistas16/35" o tabla "Total de Pistas abiertas | 16/35"
  let pistasAbiertas = null, pistasTotal = null;
  const pC = t.match(/Pistas\s+(\d+)\/(\d+)/i);
  const pT = t.match(/Total\s+de\s+Pistas\s+abiertas\s+\|\s+(\d+)\/(\d+)/i);
  const pM = pT || pC;
  if (pM) { pistasAbiertas = parseInt(pM[1]); pistasTotal = parseInt(pM[2]); }

  // Remontes: listado "Remontes8/15" o tabla "Total de remontes abiertos | 8/15"
  let remontesAbiertos = null, remontesTotal = null;
  const rC = t.match(/Remontes\s+(\d+)\/(\d+)/i);
  const rT = t.match(/Total\s+de\s+remontes\s+abiertos\s+\|\s+(\d+)\/(\d+)/i);
  const rM = rT || rC;
  if (rM) { remontesAbiertos = parseInt(rM[1]); remontesTotal = parseInt(rM[2]); }

  // Tipo nieve: tabla "Tipo de Nieve | Húmeda"
  const niM = t.match(/Tipo\s+de\s+Nieve\s+([A-Za-záéíóúÁÉÍÓÚüÜñÑ]+)/i);
  const tipoNieve = niM ? niM[1].trim() : null;

  // Espesores: "Espesor Máximo 70 cm" (sin pipe — stripTags elimina las etiquetas td)
  const espMaxM = t.match(/Espesor\s+M[áa]ximo\s+(\d+)/i);
  const espMinM = t.match(/Espesor\s+M[íi]nimo\s+(\d+)/i);
  const espesorMax = espMaxM ? parseInt(espMaxM[1]) : null;
  const espesorMin = espMinM ? parseInt(espMinM[1]) : null;

  // Cota: "Cota de Nieve 1700 m"
  const cotaM = t.match(/Cota\s+de\s+Nieve\s+(\d{3,4})/i);
  const cotaNieve = cotaM ? parseInt(cotaM[1]) : null;

  // Actualizado
  const fechaM = t.match(/Actualizado[^\d]*(\d{1,2}[-/]\d{1,2}[-/]\d{2,4})/i);
  const actualizado = fechaM ? fechaM[1].trim() : null;

  return { estado, kmAbiertos, kmTotal, pistasAbiertas, pistasTotal, remontesAbiertos, remontesTotal, tipoNieve, espesorMax, espesorMin, cotaNieve, actualizado };
}

// Parser para eltiempo.es — strip HTML tags first, then regex on clean text
// Formato verificado hoy: "Km abiertos 147 /173", "Pistas abiertas 113 /131"
function stripTags(html) {
  return html.replace(/<[^>]+>/g, ' ').replace(/&nbsp;/g, ' ').replace(/\s+/g, ' ');
}

function parseInfonieve(html) {
  // Texto limpio: sin etiquetas, colapsar espacios
  const t = stripTags(html).replace(/\s+/g, ' ');

  // Estado: eltiempo.es pone "Abierta"/"Cerrada" en el título de página
  const estado = /Abierta/i.test(t) ? 'Abierta' : /Cerrada/i.test(t) ? 'Cerrada' : 'Desconocido';

  // Km abiertos — funciona con · y con espacio como separador:
  //   "Km abiertos · 23/50"  o  "Km abiertos 147 /173"
  let kmAbiertos = null, kmTotal = null;
  const kmM = t.match(/Km\s+abiertos\s*[·\s]*(\d+(?:\.\d+)?)\s*\/\s*(\d+(?:\.\d+)?)/i);
  if (kmM) { kmAbiertos = parseFloat(kmM[1]); kmTotal = parseFloat(kmM[2]); }

  // Pistas abiertas — "Pistas abiertas · 29/57" o "Pistas abiertas 113 /131"
  let pistasAbiertas = null, pistasTotal = null;
  const pM = t.match(/Pistas\s+abiertas\s*[·\s]*(\d+)\s*\/\s*(\d+)/i);
  if (pM) { pistasAbiertas = parseInt(pM[1]); pistasTotal = parseInt(pM[2]); }

  // Remontes — "remontes abiertos · 15/22" o "remontes abiertos 32 /36"
  let remontesAbiertos = null, remontesTotal = null;
  const rM = t.match(/remontes\s+abiertos\s*[·\s]*(\d+)\s*\/\s*(\d+)/i);
  if (rM) { remontesAbiertos = parseInt(rM[1]); remontesTotal = parseInt(rM[2]); }

  // Tipo nieve — "Tipo de nieve · Polvo-dura" o "Tipo de nieve Primavera"
  const niM = t.match(/Tipo\s+de\s+nieve\s*[·\s]*([A-Za-záéíóúÁÉÍÓÚüÜñÑ][A-Za-záéíóúÁÉÍÓÚüÜñÑ\-]*)/i);
  const tipoNieve = niM ? niM[1].trim() : null;

  // Espesores — "ESPESOR MÁXIMO (CM) 95" o "ESPESOR MÁXIMO (CM) · 95"
  const espMaxM = t.match(/ESPESOR\s+M[ÁA]XIMO\s*(?:\(CM\))?\s*[·]?\s*(\d+)/i);
  const espMinM = t.match(/ESPESOR\s+M[ÍI]NIMO\s*(?:\(CM\))?\s*[·]?\s*(\d+)/i);
  const espesorMax = espMaxM ? parseInt(espMaxM[1]) : null;
  const espesorMin = espMinM ? parseInt(espMinM[1]) : null;

  // Cota de nieve
  const cotaM = t.match(/[Cc]ota(?:\s+de\s+nieve)?\s*[·]?\s*(\d{3,4})\s*m/i);
  const cotaNieve = cotaM ? parseInt(cotaM[1]) : null;

  // Actualizado
  const actM = t.match(/ltima\s+actualizaci[oó]n[:\s]*(\d{1,2}\/\d{1,2}\/\d{4}[^|·<]*)/i)
    || t.match(/Actualizado\s+(\d{1,2}:\d{2})/i);
  const actualizado = actM ? actM[1].trim() : null;

  return { estado, kmAbiertos, kmTotal, pistasAbiertas, pistasTotal, remontesAbiertos, remontesTotal, tipoNieve, espesorMax, espesorMin, cotaNieve, actualizado };
}

// Parser para grandvalira.com — sectores Soldeu-El Tarter y Grau Roig
// Ambos apuntan a la misma URL pero mostramos los datos globales de Grandvalira
// Formato: "Calidad de la nieve Primavera", "Cotas de nieve 260-310",
//          "Pistas abiertas 15/16", "Instalaciones abiertas 11/11"
function parseGrandvalira(html) {
  const t = stripTags(html).replace(/\s+/g,' ');

  const estado = /Abierta/i.test(t) ? 'Abierta' : /Cerrada/i.test(t) ? 'Cerrada' : 'Desconocido';

  // Pistas abiertas: "Pistas abiertas 15/16"
  let pistasAbiertas = null, pistasTotal = null;
  const pM = t.match(/Pistas\s+abiertas\s+(\d+)\/(\d+)/i);
  if (pM) { pistasAbiertas = parseInt(pM[1]); pistasTotal = parseInt(pM[2]); }

  // Instalaciones/remontes: "Instalaciones abiertas 11/11"
  let remontesAbiertos = null, remontesTotal = null;
  const rM = t.match(/Instalaciones\s+abiertas\s+(\d+)\/(\d+)/i)
    || t.match(/[Rr]emontes?\s+(?:abiertos?\s*)?(\d+)\/(\d+)/i);
  if (rM) { remontesAbiertos = parseInt(rM[1]); remontesTotal = parseInt(rM[2]); }

  // Km abiertos: buscar en texto (Grandvalira no siempre lo pone directo)
  let kmAbiertos = null, kmTotal = null;
  const kmM = t.match(/Km\s+abiertos\s+([\d.]+)\s*\/\s*([\d.]+)/i)
    || t.match(/Kil[oó]metros?\s+([\d.]+)\s*\/\s*([\d.]+)/i);
  if (kmM) { kmAbiertos = parseFloat(kmM[1]); kmTotal = parseFloat(kmM[2]); }

  // Tipo/calidad nieve: "Calidad de la nieve Primavera"
  const niM = t.match(/[Cc]alidad\s+de\s+la\s+nieve\s+([A-Za-záéíóúÁÉÍÓÚüÜñÑ ]+?)(?:\s{2}|\||$)/i)
    || t.match(/[Cc]alidad\s+nieve\s+([A-Za-záéíóúÁÉÍÓÚüÜñÑ]+)/i);
  const tipoNieve = niM ? niM[1].trim() : null;

  // Espesores: "Cotas de nieve 260-310" → min-max o "Espesores de nieve (cm) 230-310"
  let espesorMin = null, espesorMax = null;
  const espM = t.match(/[Ee]spesores?(?:\s+de\s+nieve)?[^\d]*(\d+)[\s-]+(\d+)\s*cm/i)
    || t.match(/[Cc]otas?\s+de\s+nieve[^\d]*(\d+)[\s-]+(\d+)/i);
  if (espM) { espesorMin = parseInt(espM[1]); espesorMax = parseInt(espM[2]); }

  // Cota nieve base
  const cotaM = t.match(/[Cc]ota\s+(?:de\s+)?nieve[^\d]*(\d{3,4})/i);
  const cotaNieve = cotaM ? parseInt(cotaM[1]) : null;

  // Actualizado
  const actM = t.match(/ltima\s+actualizaci[oó]n[:\s]*(\d{1,2}\/\d{1,2}\/\d{4}[^|<]*)/i)
    || t.match(/Actualizado\s+(\d{1,2}:\d{2})/i);
  const actualizado = actM ? actM[1].trim() : null;

  return { estado, kmAbiertos, kmTotal, pistasAbiertas, pistasTotal, remontesAbiertos, remontesTotal, tipoNieve, espesorMax, espesorMin, cotaNieve, actualizado };
}

async function fetchStatus(resort) {
  const html = await proxyFetchWithRetry(resort.url);
  if (!html) return null;
  try {
    let data;
    if (resort.parser === 'dipuleon') data = parseDipuLeon(html);
    else if (resort.parser === 'grandvalira') data = parseGrandvalira(html);
    else data = parseInfonieve(html);
    if (!data.estado && data.kmAbiertos === null && data.pistasAbiertas === null) return null;
    return data;
  } catch { return null; }
}

const MODELS=[{p:'models=ecmwf_ifs04',n:'ECMWF'},{p:'models=gfs_seamless',n:'GFS'},{p:'models=icon_seamless',n:'ICON'}];
const avg=arr=>{const v=arr.filter(x=>x!=null&&!isNaN(x));return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
const rnd=v=>Math.round(v);

function dlbl(iso,i){if(i===0)return'HOY';if(i===1)return'MAÑANA';return DAYS[new Date(iso+'T12:00:00').getDay()];}
function sProb(w,t){if([71,73,75,77,85,86].includes(w))return t<=2?93:65;if([51,53,55,61,63,65,80,81,82].includes(w))return t<=0?55:8;if([95,96,99].includes(w))return t<=1?45:8;return 0;}
function freshSn(sc,pm,t){if(sc>0)return rnd(sc);if(t>2)return 0;return rnd(pm*(t<=-5?12:t<=-2?9:t<=0?7:4)/10);}
function snQual(hi,lo,w){if([71,73,75,85,86].includes(w)&&hi<0)return'Polvo seco ❄️';if([71,73,75,85,86].includes(w)&&hi<=2)return'Polvo húmedo 🌨️';if(hi>5)return'Primaveral 🌤️';if(lo<-8)return'Polvo seco ❄️';if(hi<0)return'Polvo ❄️';return'Compacta 🏔️';}
function skiSc(w,t,wi,fr){let s=7;if([0,1].includes(w))s+=2;else if([45,48].includes(w))s-=3;else if([71,73,75,85,86].includes(w))s+=1;else if([95,96,99].includes(w))s-=4;else if([61,63,65,80,81,82].includes(w))s-=2;if(t>7)s-=2;if(wi>60)s-=3;else if(wi>40)s-=1;if(fr>10)s+=1;return Math.max(1,Math.min(10,s));}
function rel(arr){const v=arr.filter(x=>x!=null);if(v.length<2)return 80;const sp=Math.max(...v)-Math.min(...v);return sp<1?95:sp<2?85:sp<3?72:sp<4?58:42;}
function sC(s){return s>=8?'#22d3ee':s>=6?'#86efac':s>=4?'#fde68a':'#f87171';}
function rC(p){return p>=85?'#22d3ee':p>=70?'#86efac':p>=55?'#fde68a':'#fb923c';}
function rL(p){return p>=85?'MUY FIABLE':p>=70?'FIABLE':p>=55?'MODERADO':'INCERTIDUMBRE';}

async function fetchModel(lat,lon,alt,mp){
  const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&elevation=${alt}&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,snowfall_sum,windspeed_10m_max,windgusts_10m_max,sunshine_duration,precipitation_probability_max,relative_humidity_2m_max&${mp}&wind_speed_unit=kmh&timezone=Europe%2FMadrid&forecast_days=7`;
  try{const r=await fetch(url);return r.ok?r.json():null;}catch{return null;}
}
async function fetchCima(lat,lon,alt){
  try{const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&elevation=${alt}&daily=temperature_2m_max&wind_speed_unit=kmh&timezone=Europe%2FMadrid&forecast_days=1`);return r.ok?r.json():null;}catch{return null;}
}
async function fetchWx(resort){
  const[m1,m2,m3,cima]=await Promise.all([
    fetchModel(resort.lat,resort.lon,resort.alt,MODELS[0].p),
    fetchModel(resort.lat,resort.lon,resort.alt,MODELS[1].p),
    fetchModel(resort.lat,resort.lon,resort.alt,MODELS[2].p),
    fetchCima(resort.lat,resort.lon,resort.topAlt),
  ]);
  const ms=[m1,m2,m3].filter(Boolean);
  if(!ms.length)throw new Error('Sin datos');
  return ms[0].daily.time.map((date,i)=>{
    const hi=ms.map(m=>m.daily.temperature_2m_max?.[i]);
    const lo=ms.map(m=>m.daily.temperature_2m_min?.[i]);
    const pr=ms.map(m=>m.daily.precipitation_sum?.[i]);
    const sn=ms.map(m=>m.daily.snowfall_sum?.[i]);
    const wd=ms.map(m=>m.daily.windspeed_10m_max?.[i]);
    const gu=ms.map(m=>m.daily.windgusts_10m_max?.[i]);
    const su=ms.map(m=>m.daily.sunshine_duration?.[i]);
    const pp=ms.map(m=>m.daily.precipitation_probability_max?.[i]);
    const hu=ms.map(m=>m.daily.relative_humidity_2m_max?.[i]);
    const tmax=rnd(avg(hi)),tmin=rnd(avg(lo));
    const tcima=i===0?rnd(cima?.daily?.temperature_2m_max?.[0]??(tmax-9)):(tmax-8);
    const precip=Math.round(avg(pr)*10)/10,snow=avg(sn),wind=rnd(avg(wd)),gusts=rnd(avg(gu));
    const sunH=Math.round(avg(su)/3600*10)/10,probP=rnd(avg(pp)),humid=rnd(avg(hu));
    const wmos=ms.map(m=>m.daily.weathercode?.[i]??0);
    const wmo=wmos.reduce((a,b)=>b>a?b:a,0);
    const nf=freshSn(snow,precip,tmax),pn=sProb(wmo,tmax),score=skiSc(wmo,tmax,wind,nf),r=rel(hi);
    return{
      date,label:dlbl(date,i),wmo,
      icono:WMO_I[wmo]??'🌡️',cond:WMO_D[wmo]??'Variable',
      hi:tmax,lo:tmin,cima:tcima,
      wind,gusts,humid,precip,nf,pn,
      probLluvia:(wmo>=51&&tmax>2)?probP:0,sunH,
      snQual:snQual(tmax,tmin,wmo),score,rel:r,
      models:ms.map((m,mi)=>({n:MODELS[mi].n,hi:rnd(hi[mi]??tmax),lo:rnd(lo[mi]??tmin),mm:Math.round((pr[mi]??precip)*10)/10})),
      reco:score>=8?'¡Día perfecto! Sal temprano.':score>=6?'Buenas condiciones.':score>=4?'Condiciones aceptables.':'Día complicado.',
    };
  });
}

function renderHome(filter=''){
  const list=document.getElementById('resort-list');
  if(!list)return;
  const f=filter.toLowerCase();
  const filtered=RESORTS.filter(r=>r.name.toLowerCase().includes(f)||r.region.toLowerCase().includes(f));
  list.innerHTML=filtered.map(r=>{
    const c=homeCache[r.id];
    const wx=c?.wx, st=c?.status, loading=!c;

    const wxHtml=wx
      ?`<div class="rc-wx"><span class="rc-wx-icon">${wx.icono}</span><span class="rc-wx-temp">${wx.lo}°/${wx.hi}°</span><div class="rc-wx-cond">${wx.cond}</div></div>`
      :`<div class="rc-wx" style="width:52px;height:44px"></div>`;

    let stBar;
    if(loading){
      stBar=`<div class="rc-st"><div class="shimmer"></div></div>`;
    }else{
      const isOpen=st?.estado==='Abierta';
      const dc=isOpen?'#86efac':st?.estado==='Cerrada'?'#f87171':'#475569';
      const chips=[
        st?.kmAbiertos?`<div class="chip"><span class="chip-lbl">🎿</span><span class="chip-val" style="color:#22d3ee">${st.kmAbiertos}${st.kmTotal?'/'+st.kmTotal:''}km</span></div>`:'',
        st?.pistasAbiertas?`<div class="chip"><span class="chip-lbl">🚩</span><span class="chip-val" style="color:#86efac">${st.pistasAbiertas}${st.pistasTotal?'/'+st.pistasTotal:''}</span></div>`:'',
        st?.remontesAbiertos?`<div class="chip"><span class="chip-lbl">🚡</span><span class="chip-val" style="color:#fde68a">${st.remontesAbiertos}${st.remontesTotal?'/'+st.remontesTotal:''}</span></div>`:'',
        (st?.tipoNieve&&st.tipoNieve!='null')?`<div class="chip"><span class="chip-lbl">❄️</span><span class="chip-val" style="color:#c4b5fd">${st.tipoNieve}</span></div>`:'',
        (st?.espesorMax&&st?.espesorMin&&st.espesorMax!='null')?`<div class="chip"><span class="chip-lbl">📏</span><span class="chip-val" style="color:#a5b4fc">${st.espesorMin}–${st.espesorMax}cm</span></div>`:'',
      ].filter(Boolean).join('');
      const estadoChip=st
        ?`<div class="chip"><div class="chip-dot" style="background:${dc}"></div><span class="chip-val" style="color:${dc}">${st.estado||'—'}</span></div>`
        :`<span style="font-size:9px;color:#475569;font-family:'DM Mono',monospace">Estado no disponible</span>`;
      stBar=`<div class="rc-st">${estadoChip}${chips}</div>`;
    }

    return`<div class="rc" onclick="openResort(${r.id})">
      <div class="rc-top">
        <div class="rc-left"><span class="rc-emoji">${r.icon}</span>
          <div><div class="rc-name">${r.name}</div><div class="rc-region">${r.region}</div></div>
        </div>
        <div class="rc-right">${wxHtml}<span class="rc-arrow">›</span></div>
      </div>
      ${stBar}
    </div>`;
  }).join('');
}

// Carga en tandas de 3 para no saturar los proxies CORS gratuitos.
// Cada tanda actualiza la UI según van llegando los datos.
function updateLoadStatus() {
  const done = Object.keys(homeCache).length;
  const total = RESORTS.length;
  const el = document.getElementById('load-status');
  if (!el) return;
  if (done < total) {
    el.textContent = `⏳ ${done}/${total} cargadas…`;
    el.style.color = '#22d3ee';
  } else {
    const hora = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    el.textContent = `✓ Actualizado ${hora}`;
    el.style.color = '#86efac';
  }
}

async function loadBatch(resorts) {
  await Promise.allSettled(resorts.map(async r => {
    try {
      const [wxDays, status] = await Promise.all([
        fetchWx(r).catch(() => null),
        fetchStatus(r).catch(() => null),
      ]);
      homeCache[r.id] = { wx: wxDays?.[0] ?? null, status, ts: Date.now() };
    } catch {
      homeCache[r.id] = { wx: null, status: null, ts: Date.now() };
    }
    updateLoadStatus();
    renderHome(document.querySelector('.search-input')?.value || '');
  }));
}

async function loadAllHome() {
  homeCache = {};
  renderHome();
  updateLoadStatus();
  const BATCH = 3;
  for (let i = 0; i < RESORTS.length; i += BATCH) {
    await loadBatch(RESORTS.slice(i, i + BATCH));
    if (i + BATCH < RESORTS.length) await new Promise(r => setTimeout(r, 400));
  }
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active');window.scrollTo(0,0);}

async function openResort(id){
  curResort=RESORTS.find(r=>r.id===id);
  curDay=0;
  showScreen('detail');
  document.getElementById('detail-body').innerHTML=`
    <div class="d-title-row"><span class="d-emoji">${curResort.icon}</span><span class="d-name">${curResort.name}</span></div>
    <div class="d-meta">${curResort.region} · Base ${curResort.alt}m — Cima ${curResort.topAlt}m · ${curResort.km}km totales</div>
    <div class="loader"><div class="sp"><div class="sp1"></div><div class="sp2"></div><div class="sp3"></div></div>
    <div class="ldr-t">CARGANDO DATOS EN TIEMPO REAL</div>
    <div class="ldr-s">Estado oficial · ECMWF · GFS · ICON</div></div>`;

  try{
    const cached=homeCache[id];
    const fresh=cached&&(Date.now()-cached.ts)<600000;
    const[dias,status]=await Promise.all([
      fetchWx(curResort),
      fresh?Promise.resolve(cached.status):fetchStatus(curResort),
    ]);
    curDias=dias; curStatus=status;
    if(!fresh) homeCache[id]={wx:dias[0],status,ts:Date.now()};
    renderDetail();
  }catch(e){
    document.getElementById('detail-body').innerHTML=`
      <div class="d-title-row"><span class="d-emoji">${curResort.icon}</span><span class="d-name">${curResort.name}</span></div>
      <div style="text-align:center;padding:60px 20px">
        <div style="color:#f87171;font-family:'DM Mono',monospace;font-size:12px;margin-bottom:16px">⚠ Error cargando datos</div>
        <button onclick="openResort(${id})" style="padding:10px 20px;border-radius:10px;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.25);color:#22d3ee;cursor:pointer;font-family:'DM Mono',monospace">↻ Reintentar</button>
      </div>`;
  }
}

// ── WEBCAM VIEWER ─────────────────────────────
let curCam = 0;
function renderWebcams(resort) {
  const cams = resort.cams || [];
  if (!cams.length) return '<div class="wc-block"><div class="wc-title">📷 WEBCAMS</div><div style="font-size:10px;color:#475569;font-family:DM Mono,monospace">No hay webcams disponibles para esta estación.</div></div>';

  const tabs = cams.map((c,i) =>
    `<div class="wc-tab${i===0?' active':''}" onclick="switchCam(${i})" id="wc-tab-${i}">${c.l}</div>`
  ).join('');

  // Bust cache with timestamp so image refreshes each time
  const ts = Date.now();
  const firstUrl = cams[0].u + (cams[0].u.includes('?')?'&':'?') + 't=' + ts;

  return `<div class="wc-block" id="wc-block">
    <div class="wc-title">📷 WEBCAMS EN DIRECTO</div>
    <div class="wc-tabs">${tabs}</div>
    <div class="wc-img-wrap">
      <img id="wc-img" src="${firstUrl}" alt="${cams[0].l}"
           onerror="document.getElementById('wc-err').style.display='flex';this.style.display='none'"
           onload="document.getElementById('wc-err').style.display='none';this.style.display='block'">
      <div class="wc-img-err" id="wc-err">📷 Imagen no disponible</div>
    </div>
    <div class="wc-ts" id="wc-ts">Actualizado: ${new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>
  </div>`;
}

function switchCam(i) {
  const cams = curResort?.cams || [];
  if (!cams[i]) return;
  curCam = i;
  // Update tabs
  document.querySelectorAll('.wc-tab').forEach((t,j) => t.classList.toggle('active', j===i));
  // Update image with cache bust
  const img = document.getElementById('wc-img');
  const err = document.getElementById('wc-err');
  const ts = document.getElementById('wc-ts');
  if (!img) return;
  const url = cams[i].u + (cams[i].u.includes('?')?'&':'?') + 't=' + Date.now();
  err.style.display = 'none';
  img.style.display = 'block';
  img.src = url;
  img.alt = cams[i].l;
  if (ts) ts.textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

function renderDetail(){
  const dias=curDias, resort=curResort, st=curStatus;
  if(!dias||!resort)return;
  const d0=dias[0];
  const weekSc=Math.round(dias.reduce((a,d)=>a+d.score,0)/dias.length);
  const avgR=Math.round(dias.reduce((a,d)=>a+d.rel,0)/dias.length);

  // STATUS BLOCK
  let stHTML;
  if(!st){
    stHTML=`<div class="st-block">
      <div class="st-block-title"><span>📡 ESTADO OFICIAL</span><a href="${resort.url}" target="_blank" class="st-link" style="font-size:8px">Ver web ↗</a></div>
      <div style="font-size:10px;color:#475569;font-family:'DM Mono',monospace;padding:8px 0">No se pudo obtener el estado oficial de la estación.</div>
    </div>`;
  }else{
    const isOpen=st.estado==='Abierta';
    const dc=isOpen?'#86efac':'#f87171';
    const kmPct=st.kmAbiertos&&st.kmTotal?Math.round(parseFloat(st.kmAbiertos)/parseFloat(st.kmTotal)*100):null;
    stHTML=`<div class="st-block">
      <div class="st-block-title">
        <span>📡 ESTADO OFICIAL · ${st.actualizado||'HOY'}</span>
        <a href="${resort.url}" target="_blank" class="st-link" style="font-size:8px">Web oficial ↗</a>
      </div>
      <div class="st-grid">
        <div class="st-cell">
          <div class="st-cell-lbl">🚦 ESTADO</div>
          <div class="st-cell-val" style="color:${dc};font-size:13px">${st.estado||'—'}</div>
          ${kmPct!==null?`<div class="st-cell-sub">${kmPct}% operativo</div>`:''}
        </div>
        <div class="st-cell">
          <div class="st-cell-lbl">🎿 KM ABIERTOS</div>
          <div class="st-cell-val" style="color:#22d3ee">${st.kmAbiertos||'—'}</div>
          <div class="st-cell-sub">de ${st.kmTotal||resort.km}km totales</div>
        </div>
        <div class="st-cell">
          <div class="st-cell-lbl">🚩 PISTAS</div>
          <div class="st-cell-val" style="color:#86efac">${st.pistasAbiertas||'—'}</div>
          <div class="st-cell-sub">de ${st.pistasTotal||resort.runs} totales</div>
        </div>
        <div class="st-cell">
          <div class="st-cell-lbl">🚡 REMONTES</div>
          <div class="st-cell-val" style="color:#fde68a">${st.remontesAbiertos||'—'}</div>
          <div class="st-cell-sub">de ${st.remontesTotal||resort.lifts} totales</div>
        </div>
        <div class="st-cell">
          <div class="st-cell-lbl">❄️ TIPO NIEVE</div>
          <div class="st-cell-val" style="color:#c4b5fd;font-size:11px">${(st.tipoNieve&&st.tipoNieve!='null')?st.tipoNieve:'—'}</div>
          ${st.cotaNieve&&st.cotaNieve!='null'?`<div class="st-cell-sub">Cota ${st.cotaNieve}m</div>`:''}
        </div>
        <div class="st-cell">
          <div class="st-cell-lbl">📏 ESPESORES</div>
          <div class="st-cell-val" style="color:#a5b4fc;font-size:12px">${(st.espesorMin&&st.espesorMin!='null')?st.espesorMin:'—'}–${(st.espesorMax&&st.espesorMax!='null')?st.espesorMax:'—'}cm</div>
          <div class="st-cell-sub">mínimo–máximo</div>
        </div>
      </div>
      <div class="st-footer">✅ Fuente: ${resort.url}</div>
    </div>`;
  }

  // WX HOY
  const wxHTML=`<div class="wx-block">
    <div class="wx-title">🌤 METEOROLOGÍA HOY · ECMWF + GFS + ICON VÍA OPEN-METEO</div>
    <div class="wx-top">
      <span class="wx-icon">${d0.icono}</span>
      <div>
        <div class="wx-tmax">${d0.hi}°C</div>
        <div class="wx-tmin">Mín ${d0.lo}°C</div>
        <div class="wx-cima">☁ Cima ${d0.cima}°C</div>
        <div class="wx-cond">${d0.cond}</div>
      </div>
    </div>
    <div class="wx-bar-row">
      <div class="wx-bar-bg"><div class="wx-bar-fill" style="width:${d0.score*10}%;background:${sC(d0.score)}"></div></div>
      <span class="wx-bar-val" style="color:${sC(d0.score)}">${d0.score}/10</span>
    </div>
    <div class="wx-bar-lbl">ÍNDICE SKI HOY · ${d0.reco}</div>
    <div class="wx-rel"><div class="wx-rel-dot" style="background:${rC(d0.rel)}"></div><span class="wx-rel-txt" style="color:${rC(d0.rel)}">${d0.rel}% FIABILIDAD · ${rL(d0.rel)}</span></div>
  </div>`;

  // 7 DÍAS
  let dayCards=`<div class="days-title">📅 PREDICCIÓN 7 DÍAS</div><div class="days-scroll">`;
  dias.forEach((d,i)=>{
    dayCards+=`<div class="dc ${curDay===i?'sel':''}" onclick="selDay(${i})">

  // DÍA SELECCIONADO

  const dayDet=`

    <div class="models-row">
      ${d.models.map(m=>`<div class="model-box">

        <span class="model-lo">${m.lo}°</span>
        <span class="model-mm">${m.mm}mm</span>
      </div>`).join('')}
    </div>
    <div class="metrics">
      ${[
        {i:'💨',l:'VIENTO',v:`${d.wind} km/h`,s:`Ráfagas ${d.gusts} km/h`,c:'#94a3b8'},
        {i:'❄️',l:'NIEVE FRESCA',v:`${d.nf} cm`,s:`Prob. nevada: ${d.pn}%`,c:'#7dd3fc'},
        {i:'🌧',l:'PRECIPITACIÓN',v:`${d.precip} mm`,s:`Prob. lluvia: ${d.probLluvia}%`,c:'#a78bfa'},

        {i:'🏔️',l:'TEMP. CIMA',v:`${d.cima}°C`,s:`Base: ${d.lo}°/${d.hi}°C`,c:'#bae6fd'},
        {i:'⭐',l:'CALIDAD NIEVE',v:d.snQual,s:'Estimación meteorológica',c:'#c4b5fd'},

        <div class="met-lbl">${m.l}</div>

    </div>`;

  document.getElementById('detail-body').innerHTML=
    `<div class="d-title-row"><span class="d-emoji">${resort.icon}</span><span class="d-name">${resort.name}</span></div>
     <div class="d-meta">${resort.region} · Base ${resort.alt}m — Cima ${resort.topAlt}m · ${resort.km}km totales</div>
     ${stHTML}${renderWebcams(resort)}${wxHTML}${dayCards}${dayDet}`;
}
